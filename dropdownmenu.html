<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="style.css">

</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#0d58cf);
    height:100vh;
}

/* Navbar */
.navbar{
    width:90%;
    margin:30px auto;
    padding:18px 30px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(8, 78, 228, 0.79);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:18px;

    box-shadow:0 20px 40px rgba(0,0,0,.35);
}

/* Logo */
.logo{
    color:#fff;
    font-size:24px;
    font-weight:700;
}

/* Menu */
.menu{
    display:flex;
    list-style:none;
    gap:25px;
}

.menu li a{
    text-decoration:none;
    color:#cbd5e1;
    font-weight:500;
    transition:.3s;
    position:relative;
}

.menu li a:hover{
    color:#38bdf8;
}

/* Dropdown */
.dropdown{
    position:relative;
}

/* Dropdown Menu */
.dropdown-menu{
    position:absolute;
    top:40px;
    left:0;

    min-width:200px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:12px;

    list-style:none;
    padding:10px 0;

    opacity:0;
    visibility:hidden;
    transform:translateY(10px);
    transition:.3s;
}

/* Show on hover */
.dropdown:hover .dropdown-menu{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

.dropdown-menu li a{
    display:block;
    padding:10px 18px;
    color:#cbd5e1;
    font-size:14px;
    transition:.3s;
}

.dropdown-menu li a:hover{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:#fff;
}
</style>
<body>

<div class="navbar">

    <div class="logo">Dropdown Menu</div>

    <ul class="menu">

        <li><a href="#">Home</a></li>

        <li class="dropdown">

            <a href="#">Services ▾</a>

            <ul class="dropdown-menu">
                <li><a href="#">Web Design</a></li>
                <li><a href="#">Web Development</a></li>
                <li><a href="#">UI/UX Design</a></li>
                <li><a href="#">SEO Optimization</a></li>
            </ul>

        </li>

        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>

    </ul>

</div>

</body>
</html>
    
</body>
</html>
